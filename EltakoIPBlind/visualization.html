<style>
  html,body{margin:0;padding:0;overflow:hidden;}
  .thbox{ --num:#ffffff; --txt:#c7ccd6; --sub:#8a93a0; --chip:#2b2f3a; --chiptx:#e8ebf0; }
  @media (prefers-color-scheme: light){
    .thbox.th-auto{ --num:#13202b; --txt:#3a4753; --sub:#6b7782; --chip:#e6eaf0; --chiptx:#3a4753; }
  }
  .thbox.th-light{ --num:#13202b; --txt:#3a4753; --sub:#6b7782; --chip:#e6eaf0; --chiptx:#3a4753; }
  .thbox.th-dark{ --num:#ffffff; --txt:#c7ccd6; --sub:#8a93a0; --chip:#2b2f3a; --chiptx:#e8ebf0; }
  #rsBox{position:relative;width:100%;overflow:hidden;}
  .rs-card{position:absolute;left:50%;top:50%;transform-origin:center center;
    font-family:'Segoe UI',Roboto,Helvetica,Arial,sans-serif;color:var(--txt);text-align:center;
    width:240px;box-sizing:border-box;padding:6px;}
  .rs-name{font-size:15px;font-weight:700;color:var(--num);margin-bottom:6px;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .rs-win{position:relative;width:210px;height:158px;margin:0 auto;border-radius:6px;overflow:hidden;
    border:3px solid #566070;background:__PHOTO__;background-size:cover;background-position:center;}
  #rsSky{position:absolute;left:0;top:0;width:100%;height:100%;display:block;}
  .rs-shutter{position:absolute;left:0;top:0;width:100%;height:0;z-index:2;
    background:repeating-linear-gradient(180deg,#f3f5f8 0px,#e7eaee 3px,#cfd4db 8px,#bcc2cb 9px);
    box-shadow:0 3px 6px rgba(0,0,0,.35);transition:height .32s linear;}
  .rs-shutter::after{content:'';position:absolute;left:0;bottom:0;width:100%;height:5px;
    background:#9aa0aa;border-bottom:1px solid #7d828b;}
  .rs-state{margin-top:7px;font-size:13px;color:var(--txt);}
  .rs-state b{color:var(--num);}
  .rs-btns{margin-top:9px;display:flex;gap:6px;justify-content:center;}
  .rs-btns button{padding:7px 14px;border-radius:9px;border:none;cursor:pointer;
    font-size:12px;font-weight:700;background:var(--chip);color:var(--chiptx);}
  .rs-btns button:active{transform:scale(.94);}
  .rs-up{color:#2e9e4f;} .rs-stop{color:#d99100;} .rs-dn{color:#2f7fd0;}
  .rs-slider{margin-top:10px;display:flex;align-items:center;gap:8px;justify-content:center;
    font-size:10px;color:var(--sub);}
  .rs-slider input{width:130px;}
</style>
<div id="rsBox" class="thbox __THEME__"><div class="rs-card" id="rsCard">
  <div class="rs-name">__NAME__</div>
  <div class="rs-win" id="rsWin">
    <canvas id="rsSky"></canvas>
    <div class="rs-shutter" id="rsShutter"></div>
  </div>
  <div class="rs-state" id="rsState">&ndash;</div>
  <div class="rs-btns">
    <button class="rs-up"   onclick="requestAction('Move',0)">&#9650; Auf</button>
    <button class="rs-stop" onclick="requestAction('Move',1)">&#9632; Stop</button>
    <button class="rs-dn"   onclick="requestAction('Move',2)">&#9660; Zu</button>
  </div>
  <div class="rs-slider">
    <span>Zu</span>
    <input id="rsSlider" type="range" min="0" max="100" step="1"
      oninput="rsLbl(this.value)" onchange="requestAction('Position', parseInt(this.value,10))">
    <span>Auf</span>
  </div>
</div></div>
<script>
  var RS_MODE = '__MODE__';
  window.rsLevel = 0;

  function rsLbl(v){ document.getElementById('rsState').innerHTML = rsTxt(parseInt(v,10)); }
  function rsTxt(l){ return l>=99 ? '<b>Offen</b>' : (l<=1 ? '<b>Geschlossen</b>' : 'Position <b>'+l+' %</b>'); }

  function handleMessage(message){
    var d=(typeof message==='string')?JSON.parse(message):message;
    var l=Math.max(0,Math.min(100,Math.round(d.level)));
    window.rsLevel=l;
    document.getElementById('rsShutter').style.height=(100-l)+'%';
    document.getElementById('rsState').innerHTML=rsTxt(l);
    var sl=document.getElementById('rsSlider');
    if(document.activeElement!==sl){ sl.value=l; }
    rsFit();
  }

  // ---- Tageszeit-Aussicht (Canvas), realistisch ----
  function lerp(a,b,t){ return a+(b-a)*t; }
  function mix(c1,c2,t){ return [Math.round(lerp(c1[0],c2[0],t)),Math.round(lerp(c1[1],c2[1],t)),Math.round(lerp(c1[2],c2[2],t))]; }
  function rgb(c){ return 'rgb('+c[0]+','+c[1]+','+c[2]+')'; }
  // Farb-Stops je Stunde: [hour, top, mitte, horizont]
  var SKY=[
    [0,   [7,11,28],    [13,20,46],   [22,30,66]],
    [5.5, [20,30,60],   [60,70,110],  [150,110,120]],
    [7,   [70,130,200], [170,190,210],[255,180,120]],
    [9,   [70,150,225], [150,205,240],[205,235,255]],
    [13,  [58,128,210], [120,190,235],[190,225,255]],
    [17,  [70,135,205], [150,195,235],[222,224,232]],
    [19,  [45,70,120],  [180,110,90], [255,150,80]],
    [20.5,[25,35,75],   [70,55,90],   [120,70,90]],
    [22,  [9,14,34],    [15,22,50],   [24,32,68]],
    [24,  [7,11,28],    [13,20,46],   [22,30,66]]
  ];
  function skyAt(hr){
    for(var i=0;i<SKY.length-1;i++){
      if(hr>=SKY[i][0] && hr<=SKY[i+1][0]){
        var t=(hr-SKY[i][0])/(SKY[i+1][0]-SKY[i][0]);
        return [mix(SKY[i][1],SKY[i+1][1],t), mix(SKY[i][2],SKY[i+1][2],t), mix(SKY[i][3],SKY[i+1][3],t)];
      }
    }
    return [SKY[0][1],SKY[0][2],SKY[0][3]];
  }
  function puff(ctx,x,y,r){ ctx.beginPath(); ctx.arc(x,y,r,0,7); ctx.fill(); }
  var rsStars=null, rsClouds=[[0.20,0.20,1.0],[0.58,0.14,1.25],[0.80,0.30,0.85]];
  function drawSky(){
    var c=document.getElementById('rsSky'); if(!c) return;
    var w=c.clientWidth||210, h=c.clientHeight||158; c.width=w; c.height=h;
    var ctx=c.getContext('2d');
    var now=new Date(); var hr=now.getHours()+now.getMinutes()/60;
    var cols=skyAt(hr);
    var g=ctx.createLinearGradient(0,0,0,h);
    g.addColorStop(0,rgb(cols[0])); g.addColorStop(0.55,rgb(cols[1])); g.addColorStop(1,rgb(cols[2]));
    ctx.fillStyle=g; ctx.fillRect(0,0,w,h);

    var night=(hr<5.0 || hr>20.8);
    var sunUp=(hr>=6.0 && hr<=19.2);
    var altSun= sunUp ? Math.sin(((hr-6.0)/(19.2-6.0))*Math.PI) : 0;

    // Sterne (abgestuft ein-/ausblenden)
    var starA=(hr<4.8)?1:(hr<6?(6-hr)/1.2:(hr>21?Math.min(1,(hr-21)/1.0):0));
    if(starA>0){
      if(!rsStars){ rsStars=[]; for(var i=0;i<34;i++){ rsStars.push([Math.random(),Math.random()*0.62,0.4+Math.random()*0.6]); } }
      for(var s=0;s<rsStars.length;s++){ ctx.fillStyle='rgba(255,255,255,'+(starA*rsStars[s][2]).toFixed(2)+')';
        var ss=rsStars[s][2]>0.8?1.7:1.1; ctx.fillRect(rsStars[s][0]*w, rsStars[s][1]*h, ss, ss); }
    }

    if(sunUp){
      var prog=(hr-6.0)/(19.2-6.0), cx=prog*w, cy=h*0.96-altSun*h*0.78;
      var hal=ctx.createRadialGradient(cx,cy,2,cx,cy,46);
      hal.addColorStop(0,'rgba(255,240,170,0.55)'); hal.addColorStop(1,'rgba(255,220,120,0)');
      ctx.fillStyle=hal; ctx.beginPath(); ctx.arc(cx,cy,46,0,7); ctx.fill();
      ctx.fillStyle=rgb(mix([255,150,70],[255,225,120],altSun));
      ctx.beginPath(); ctx.arc(cx,cy,8.5,0,7); ctx.fill();
    } else if(night){
      var nh=(hr>19.2)?(hr-19.2):(hr+4.8), p2=nh/((24-19.2)+6.0);
      var mx=p2*w, my=h*0.82-Math.sin(p2*Math.PI)*h*0.60;
      ctx.fillStyle='rgba(245,247,252,0.95)'; ctx.beginPath(); ctx.arc(mx,my,7.5,0,7); ctx.fill();
      ctx.fillStyle=rgb(cols[0]); ctx.beginPath(); ctx.arc(mx+3.5,my-2.5,6.5,0,7); ctx.fill();
    }

    // Wolken (tagsueber; in der Daemmerung warm getoent; nachts aus)
    var cloudA= night?0:(0.85*Math.min(1,Math.max(0.12,altSun+0.25)));
    if(cloudA>0.05){
      var ctint=(hr<7||hr>18)?'255,200,170':'255,255,255';
      for(var k=0;k<rsClouds.length;k++){
        var clx=rsClouds[k][0]*w, cly=rsClouds[k][1]*h, sc=rsClouds[k][2];
        ctx.fillStyle='rgba('+ctint+','+(cloudA*0.9).toFixed(2)+')';
        puff(ctx,clx,cly,9*sc); puff(ctx,clx+9*sc,cly+3*sc,12*sc); puff(ctx,clx+20*sc,cly,9*sc); puff(ctx,clx+10*sc,cly-5*sc,9*sc);
      }
    }

    // Landschaft: zwei gestaffelte Huegel + Baum-Silhouette
    ctx.fillStyle=rgb(night?[34,60,40]:[140,190,120]);
    ctx.beginPath(); ctx.moveTo(0,h); ctx.lineTo(0,h*0.80);
    ctx.quadraticCurveTo(w*0.35,h*0.70,w*0.70,h*0.80); ctx.quadraticCurveTo(w*0.88,h*0.85,w,h*0.79); ctx.lineTo(w,h); ctx.closePath(); ctx.fill();
    ctx.fillStyle=rgb(night?[20,42,26]:[95,160,80]);
    ctx.beginPath(); ctx.moveTo(0,h); ctx.lineTo(0,h*0.88);
    ctx.quadraticCurveTo(w*0.5,h*0.80,w,h*0.88); ctx.lineTo(w,h); ctx.closePath(); ctx.fill();
    var tc=night?[16,30,20]:[58,108,54], tx=w*0.15, ty=h*0.87;
    ctx.fillStyle=rgb(night?[40,28,18]:[90,62,40]); ctx.fillRect(tx-1.5,ty-6,3,12);
    ctx.fillStyle=rgb(tc); ctx.beginPath(); ctx.arc(tx,ty-10,9,0,7); ctx.fill();
    ctx.beginPath(); ctx.arc(tx-6,ty-6,6,0,7); ctx.fill(); ctx.beginPath(); ctx.arc(tx+6,ty-6,6,0,7); ctx.fill();
  }

  function rsFit(){
    var box=document.getElementById('rsBox'), c=document.getElementById('rsCard');
    if(!box||!c) return;
    var w=window.innerWidth||1, h=window.innerHeight||1;
    box.style.height=h+'px';
    c.style.transform='translate(-50%,-50%)';
    var s=Math.min(w/(c.offsetWidth||1), h/(c.offsetHeight||1));
    if(!isFinite(s)||s<=0) s=1;
    c.style.transform='translate(-50%,-50%) scale('+s+')';
  }

  (function init(){
    if(RS_MODE==='daytime'){
      drawSky();
      setInterval(drawSky, 60000);
      window.addEventListener('resize', drawSky);
    } else {
      var sk=document.getElementById('rsSky'); if(sk){ sk.style.display='none'; }
    }
    window.addEventListener('resize', rsFit);
    window.addEventListener('load', function(){ rsFit(); setTimeout(rsFit,80); setTimeout(rsFit,300); if(RS_MODE==='daytime'){ setTimeout(drawSky,120);} });
  })();
</script>
