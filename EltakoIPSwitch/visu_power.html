<style>
  html,body{margin:0;padding:0;overflow:hidden;}
  .thbox{ --num:#ffffff; --txt:#c7ccd6; --sub:#8a93a0; --chip:#2b2f3a; --chiptx:#e8ebf0; }
  @media (prefers-color-scheme: light){
    .thbox.th-auto{ --num:#13202b; --txt:#3a4753; --sub:#6b7782; --chip:#e6eaf0; --chiptx:#3a4753; }
  }
  .thbox.th-light{ --num:#13202b; --txt:#3a4753; --sub:#6b7782; --chip:#e6eaf0; --chiptx:#3a4753; }
  .thbox.th-dark{ --num:#ffffff; --txt:#c7ccd6; --sub:#8a93a0; --chip:#2b2f3a; --chiptx:#e8ebf0; }
  #pwBox{position:relative;width:100%;overflow:hidden;}
  .pw-card{position:absolute;left:50%;top:50%;transform-origin:center center;
    font-family:'Segoe UI',Roboto,Helvetica,Arial,sans-serif;color:var(--txt);text-align:center;
    width:200px;box-sizing:border-box;padding:6px;}
  .pw-name{font-size:15px;font-weight:700;color:var(--num);margin-bottom:10px;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .pw-btn{width:120px;height:120px;border-radius:50%;border:none;cursor:pointer;margin:0 auto;
    display:block;font-size:40px;color:#fff;background:#3a4150;transition:all .35s ease;
    box-shadow:0 4px 14px rgba(0,0,0,.3);}
  .pw-btn.on{background:radial-gradient(circle at 35% 30%, #43b96a, #2e9e4f);
    box-shadow:0 0 26px rgba(46,158,79,.6);}
  .pw-btn:active{transform:scale(.95);}
  .pw-state{margin-top:10px;font-size:14px;color:var(--num);font-weight:700;}
  .pw-watt{font-size:12px;color:var(--sub);min-height:14px;}
</style>
<div id="pwBox" class="thbox __THEME__"><div class="pw-card" id="pwCard">
  <div class="pw-name">__NAME__</div>
  <button class="pw-btn" id="pwBtn" onclick="pwToggle()">&#9211;</button>
  <div class="pw-state" id="pwState">Aus</div>
  <div class="pw-watt" id="pwWatt"></div>
</div></div>
<script>
  window.pwOn=false;
  function pwToggle(){ requestAction('State', !window.pwOn); }
  function handleMessage(message){
    var d=(typeof message==='string')?JSON.parse(message):message;
    window.pwOn=!!d.on;
    var b=document.getElementById('pwBtn');
    if(window.pwOn){ b.classList.add('on'); } else { b.classList.remove('on'); }
    document.getElementById('pwState').textContent = window.pwOn?'Ein':'Aus';
    var w=(d.power!==undefined && d.power!==null)?Number(d.power):0;
    document.getElementById('pwWatt').textContent = (window.pwOn && w>0)?(w.toFixed(1)+' W'):'';
    pwFit();
  }
  function pwFit(){
    var box=document.getElementById('pwBox'), c=document.getElementById('pwCard');
    if(!box||!c) return;
    var w=window.innerWidth||1, h=window.innerHeight||1;
    box.style.height=h+'px'; c.style.transform='translate(-50%,-50%)';
    var s=Math.min(w/(c.offsetWidth||1), h/(c.offsetHeight||1)); if(!isFinite(s)||s<=0)s=1;
    c.style.transform='translate(-50%,-50%) scale('+s+')';
  }
  window.addEventListener('resize', pwFit);
  window.addEventListener('load', function(){ pwFit(); setTimeout(pwFit,80); setTimeout(pwFit,300); });
</script>
