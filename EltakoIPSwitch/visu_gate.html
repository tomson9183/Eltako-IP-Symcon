<style>
  html,body{margin:0;padding:0;overflow:hidden;}
  .thbox{ --num:#ffffff; --txt:#c7ccd6; --sub:#8a93a0; --chip:#2b2f3a; --chiptx:#e8ebf0; }
  @media (prefers-color-scheme: light){
    .thbox.th-auto{ --num:#13202b; --txt:#3a4753; --sub:#6b7782; --chip:#e6eaf0; --chiptx:#3a4753; }
  }
  .thbox.th-light{ --num:#13202b; --txt:#3a4753; --sub:#6b7782; --chip:#e6eaf0; --chiptx:#3a4753; }
  .thbox.th-dark{ --num:#ffffff; --txt:#c7ccd6; --sub:#8a93a0; --chip:#2b2f3a; --chiptx:#e8ebf0; }
  #gtBox{position:relative;width:100%;overflow:hidden;}
  .gt-card{position:absolute;left:50%;top:50%;transform-origin:center center;
    font-family:'Segoe UI',Roboto,Helvetica,Arial,sans-serif;color:var(--txt);text-align:center;
    width:240px;box-sizing:border-box;padding:6px;}
  .gt-name{font-size:15px;font-weight:700;color:var(--num);margin-bottom:6px;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .gt-scene svg{width:100%;height:auto;display:block;}
  .gt-leaf{transition:transform .9s cubic-bezier(.5,.05,.3,1);}
  .gt-state{margin-top:6px;font-size:13px;color:var(--txt);}
  .gt-state b{color:var(--num);}
  .gt-btnwrap{margin-top:10px;position:relative;width:96px;height:96px;margin-left:auto;margin-right:auto;}
  .gt-ring{position:absolute;inset:0;transform:rotate(-90deg);}
  .gt-ring circle{fill:none;stroke-width:6;}
  .gt-ring .bg{stroke:rgba(127,127,127,.25);}
  .gt-ring .fg{stroke:#2e9e4f;stroke-linecap:round;stroke-dasharray:264;stroke-dashoffset:264;}
  .gt-btn{position:absolute;inset:10px;border-radius:50%;border:none;cursor:pointer;
    background:radial-gradient(circle at 35% 30%, #43b96a, #2e9e4f);color:#fff;font-weight:800;
    font-size:14px;box-shadow:0 4px 14px rgba(46,158,79,.45);}
  .gt-btn:active{transform:scale(.95);}
</style>
<div id="gtBox" class="thbox __THEME__"><div class="gt-card" id="gtCard">
  <div class="gt-name">__NAME__</div>
  <div class="gt-scene">
    <svg viewBox="0 0 200 150" preserveAspectRatio="xMidYMid meet">
      <defs>
        <linearGradient id="gtSky" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#8fc7f0"/><stop offset="100%" stop-color="#dff0ff"/>
        </linearGradient>
        <linearGradient id="gtLeaf" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#c98f5a"/><stop offset="100%" stop-color="#9c6a3c"/>
        </linearGradient>
      </defs>
      <rect x="0" y="0" width="200" height="120" fill="url(#gtSky)"/>
      <rect x="0" y="116" width="200" height="34" fill="#7bbf63"/>
      <rect x="0" y="116" width="200" height="5" fill="#5da34a"/>
      <!-- Hecke/Pfosten -->
      <rect x="20" y="60" width="14" height="60" rx="3" fill="#6b4a2c"/>
      <rect x="166" y="60" width="14" height="60" rx="3" fill="#6b4a2c"/>
      <!-- linker Torfluegel -->
      <g id="gtLeafL" class="gt-leaf" style="transform-origin:34px 90px;">
        <rect x="34" y="64" width="64" height="56" rx="3" fill="url(#gtLeaf)" stroke="#7a4f2a" stroke-width="1.5"/>
        <rect x="40" y="68" width="6" height="48" rx="2" fill="#b07c4c"/>
        <rect x="52" y="68" width="6" height="48" rx="2" fill="#b07c4c"/>
        <rect x="64" y="68" width="6" height="48" rx="2" fill="#b07c4c"/>
        <rect x="76" y="68" width="6" height="48" rx="2" fill="#b07c4c"/>
        <rect x="88" y="68" width="6" height="48" rx="2" fill="#b07c4c"/>
      </g>
      <!-- rechter Torfluegel -->
      <g id="gtLeafR" class="gt-leaf" style="transform-origin:166px 90px;">
        <rect x="102" y="64" width="64" height="56" rx="3" fill="url(#gtLeaf)" stroke="#7a4f2a" stroke-width="1.5"/>
        <rect x="106" y="68" width="6" height="48" rx="2" fill="#b07c4c"/>
        <rect x="118" y="68" width="6" height="48" rx="2" fill="#b07c4c"/>
        <rect x="130" y="68" width="6" height="48" rx="2" fill="#b07c4c"/>
        <rect x="142" y="68" width="6" height="48" rx="2" fill="#b07c4c"/>
        <rect x="154" y="68" width="6" height="48" rx="2" fill="#b07c4c"/>
      </g>
    </svg>
  </div>
  <div class="gt-state" id="gtState"><b>Bereit</b></div>
  <div class="gt-btnwrap">
    <svg class="gt-ring" viewBox="0 0 96 96"><circle class="bg" cx="48" cy="48" r="42"/><circle class="fg" id="gtRing" cx="48" cy="48" r="42"/></svg>
    <button class="gt-btn" onclick="gtOpen()">ÖFFNEN</button>
  </div>
</div></div>
<script>
  var gtDur = 2000, gtTimer = null;
  function gtOpen(){ requestAction('State', true); }
  function gtSetLeaves(open){
    var s = open ? 'scaleX(.12)' : 'scaleX(1)';
    document.getElementById('gtLeafL').style.transform = s;
    document.getElementById('gtLeafR').style.transform = s;
  }
  function gtRunRing(ms){
    var r = document.getElementById('gtRing');
    r.style.transition='none'; r.style.strokeDashoffset='0';
    void r.getBoundingClientRect();
    r.style.transition='stroke-dashoffset '+(ms/1000)+'s linear';
    r.style.strokeDashoffset='264';
  }
  function gtResetRing(){
    var r=document.getElementById('gtRing'); r.style.transition='none'; r.style.strokeDashoffset='264';
  }
  function handleMessage(message){
    var d=(typeof message==='string')?JSON.parse(message):message;
    if(d.duration){ gtDur=d.duration; }
    if(d.on){
      gtSetLeaves(true);
      document.getElementById('gtState').innerHTML='<b>Öffnet …</b>';
      gtRunRing(gtDur);
      if(gtTimer){ clearTimeout(gtTimer); }
      gtTimer=setTimeout(function(){ document.getElementById('gtState').innerHTML='<b>Bereit</b>'; }, gtDur);
    } else {
      gtSetLeaves(false);
      gtResetRing();
      document.getElementById('gtState').innerHTML='<b>Bereit</b>';
    }
    gtFit();
  }
  function gtFit(){
    var box=document.getElementById('gtBox'), c=document.getElementById('gtCard');
    if(!box||!c) return;
    var w=window.innerWidth||1, h=window.innerHeight||1;
    box.style.height=h+'px'; c.style.transform='translate(-50%,-50%)';
    var s=Math.min(w/(c.offsetWidth||1), h/(c.offsetHeight||1)); if(!isFinite(s)||s<=0)s=1;
    c.style.transform='translate(-50%,-50%) scale('+s+')';
  }
  window.addEventListener('resize', gtFit);
  window.addEventListener('load', function(){ gtFit(); setTimeout(gtFit,80); setTimeout(gtFit,300); });
</script>
